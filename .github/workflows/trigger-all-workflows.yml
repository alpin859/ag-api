name: Trigger All Workflows\n\nschedule:\n  - cron: '0 0 * * *'  # Runs daily at midnight UTC\n\n"on":\n  repository_dispatch:\n\njobs:\n  trigger_all:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Trigger workflows for multiple repositories\n        run: |\n          repositories=( ag-api data.gov html runner-images scorecard sdg-indicators-usa open-gsa-redesign Blockchair.Support Prophetjonesprofits the-book-of-secret-knowledge )\n          for repo in "${repositories[@]}"; do\n            curl -X POST -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' -H 'Accept: application/vnd.github.v3+json' \n            https://api.github.com/repos/alpin859/$repo/dispatches -d '{ "event_type": "trigger-workflow" }';\n          done\n